<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZONE DATA HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#06080f;--bg2:#0d1120;--bg3:#111827;--card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--text:#f0f4ff;--text2:#8b98b8;--accent:#00d4ff;--accent2:#7c3aed;--accent3:#f59e0b;--mtn:#ffcc00;--telecel:#e11d48;--glow:0 0 40px rgba(0,212,255,0.15);--radius:16px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);}
[data-theme="light"]{--bg:#f0f4ff;--bg2:#e8edf8;--bg3:#dde3f0;--card:rgba(255,255,255,0.7);--card-border:rgba(0,0,0,0.1);--text:#0f172a;--text2:#475569;--glow:0 0 40px rgba(124,58,237,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);}
.bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden;}
.bg-canvas::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,212,255,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(124,58,237,0.08) 0%,transparent 60%);}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);}
.float-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:floatOrb 8s ease-in-out infinite alternate;}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,255,0.3),transparent);top:-10%;left:-5%;}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(124,58,237,0.3),transparent);bottom:10%;right:-5%;animation-delay:3s;}
.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(245,158,11,0.2),transparent);top:40%;left:50%;animation-delay:5s;}
@keyframes floatOrb{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,-30px) scale(1.1);}}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 5%;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);}
[data-theme="light"] nav{background:rgba(240,244,255,0.85);}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;cursor:pointer;border:none;outline:none;}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center;}
.nav-links a{color:var(--text2);text-decoration:none;font-size:0.9rem;font-weight:500;transition:color var(--transition);}
.nav-links a:hover{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:0.75rem;}
.theme-wrap{display:flex;align-items:center;gap:0.4rem;}
.theme-label{font-size:0.75rem;color:var(--text2);}
.theme-toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;background:var(--card-border);position:relative;transition:background var(--transition);outline:none;flex-shrink:0;}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--accent);transition:transform var(--transition);}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);background:var(--accent2);}
.btn{padding:0.5rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;transition:all var(--transition);}
.btn-ghost{background:transparent;border:1px solid var(--card-border);color:var(--text);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(0,212,255,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.4);}
.btn-warn{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{width:22px;height:2px;background:var(--text);border-radius:2px;}
section{position:relative;z-index:1;}
#hero{min-height:100vh;display:flex;align-items:center;padding:100px 5% 60px;}
.hero-content{max-width:700px;}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 1rem;border-radius:20px;margin-bottom:1.5rem;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);font-size:0.8rem;color:var(--accent);font-weight:600;letter-spacing:1px;}
.hero-badge span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.5);}}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:800;line-height:1.05;margin-bottom:1.5rem;}
.hero-title .highlight{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:1.1rem;color:var(--text2);max-width:500px;line-height:1.7;margin-bottom:2.5rem;}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;}
.hero-cta .btn{padding:0.8rem 2rem;font-size:1rem;}
.hero-stats{display:flex;gap:2.5rem;margin-top:3rem;flex-wrap:wrap;}
.stat{border-left:2px solid var(--accent);padding-left:1rem;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent);}
.stat-label{font-size:0.8rem;color:var(--text2);margin-top:0.2rem;}
#how{padding:80px 5%;text-align:center;}
.section-tag{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:3px;color:var(--accent);margin-bottom:1rem;}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;margin-bottom:1rem;}
.section-sub{color:var(--text2);max-width:500px;margin:0 auto 3rem;line-height:1.7;}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;max-width:1000px;margin:0 auto;}
.step-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:2rem 1.5rem;text-align:left;position:relative;overflow:hidden;transition:transform var(--transition),border-color var(--transition);}
.step-card:hover{transform:translateY(-4px);border-color:var(--accent);}
.step-num{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--accent);opacity:0.15;position:absolute;top:1rem;right:1rem;}
.step-icon{font-size:2rem;margin-bottom:1rem;}
.step-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:0.5rem;}
.step-desc{color:var(--text2);font-size:0.875rem;line-height:1.6;}
#plans{padding:80px 5%;}
.plans-tabs{display:flex;gap:0.5rem;justify-content:center;margin-bottom:2.5rem;}
.tab-btn{padding:0.6rem 2rem;border-radius:8px;border:1px solid var(--card-border);background:transparent;color:var(--text2);cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:all var(--transition);}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.2rem;max-width:1100px;margin:0 auto;}
.plan-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;text-align:center;transition:all var(--transition);position:relative;}
.plan-card:hover{transform:translateY(-5px);box-shadow:var(--glow);border-color:var(--accent);}
.plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent3);color:#000;font-size:0.65rem;font-weight:700;padding:0.2rem 0.8rem;border-radius:10px;white-space:nowrap;}
.plan-network{font-size:0.75rem;font-weight:700;letter-spacing:2px;margin-bottom:0.5rem;}
.plan-network.mtn{color:var(--mtn);}.plan-network.telecel{color:var(--telecel);}
.plan-size{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;line-height:1;}
.plan-price{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin:0.5rem 0 1rem;}
.plan-price span{font-size:0.8rem;color:var(--text2);font-weight:400;}
.btn-order{width:100%;padding:0.6rem;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:0.85rem;font-family:'DM Sans',sans-serif;transition:all var(--transition);}
.btn-order:hover{transform:scale(1.03);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:20px;padding:2.5rem;max-width:440px;width:100%;position:relative;animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:0.3rem;}
.modal-sub{color:var(--text2);font-size:0.875rem;margin-bottom:1.5rem;}
.modal-pkg{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;}
.modal-pkg-name{font-weight:700;}.modal-pkg-price{color:var(--accent);font-family:'Orbitron',sans-serif;font-weight:700;}
.form-group{margin-bottom:1.2rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--text2);margin-bottom:0.4rem;display:block;}
.form-input{width:100%;padding:0.8rem 1rem;border-radius:10px;background:var(--bg3);border:1px solid var(--card-border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color var(--transition);}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text2);}
.pass-wrap{position:relative;}
.pass-wrap .form-input{padding-right:3rem;}
.pass-eye{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);font-size:1rem;padding:0;}
.modal-btn{width:100%;padding:0.9rem;margin-top:0.5rem;}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-radius:10px;overflow:hidden;border:1px solid var(--card-border);}
.auth-tab{flex:1;padding:0.7rem;text-align:center;cursor:pointer;font-weight:600;font-size:0.9rem;background:transparent;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all var(--transition);}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.divider{text-align:center;color:var(--text2);font-size:0.8rem;margin:1rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--card-border);}
.divider::before{left:0;}.divider::after{right:0;}
.btn-google{width:100%;padding:0.75rem;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text);cursor:pointer;font-weight:600;font-size:0.9rem;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all var(--transition);}
.btn-google:hover{border-color:var(--accent);}
.auth-err{color:#ef4444;font-size:0.8rem;margin-top:0.5rem;display:none;}
.auth-ok{color:#10b981;font-size:0.8rem;margin-top:0.5rem;display:none;}
.network-hint{font-size:0.78rem;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:0.5rem 0.75rem;margin-bottom:1rem;color:var(--accent);}
.verify-box{text-align:center;padding:0.5rem 0;}
.verify-icon{font-size:3rem;margin-bottom:1rem;}
.verify-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:0.5rem;}
.verify-sub{color:var(--text2);font-size:0.875rem;line-height:1.6;margin-bottom:1.5rem;}
.code-input{width:100%;padding:1rem;border-radius:10px;background:var(--bg3);border:2px solid var(--card-border);color:var(--text);font-family:'Orbitron',sans-serif;font-size:1.5rem;outline:none;text-align:center;letter-spacing:8px;transition:border-color var(--transition);}
.code-input:focus{border-color:var(--accent);}
.resend-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.85rem;font-family:'DM Sans',sans-serif;margin-top:1rem;text-decoration:underline;}
#dashboard-view{display:none;min-height:100vh;padding:90px 5% 60px;}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.dash-greeting{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;}
.dash-nav{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;}
.dash-nav-btn{padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--card-border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.85rem;font-weight:600;font-family:'DM Sans',sans-serif;transition:all var(--transition);}
.dash-nav-btn:hover,.dash-nav-btn.active{background:var(--accent);color:#000;border-color:transparent;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:1.5rem;}
.dash-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:1.5rem;}
.dash-card-title{font-size:0.8rem;font-weight:600;color:var(--text2);margin-bottom:0.5rem;letter-spacing:1px;text-transform:uppercase;}
.dash-card-val{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700;color:var(--accent);}
.dash-section{display:none;}.dash-section.active{display:block;}
.table-wrap{overflow-x:auto;margin-top:1rem;}
table{width:100%;border-collapse:collapse;}
th{padding:0.75rem 1rem;text-align:left;font-size:0.8rem;color:var(--text2);border-bottom:1px solid var(--card-border);}
td{padding:0.75rem 1rem;font-size:0.875rem;border-bottom:1px solid rgba(255,255,255,0.04);}
.status-badge{padding:0.2rem 0.7rem;border-radius:20px;font-size:0.75rem;font-weight:700;}
.status-pending{background:rgba(245,158,11,0.15);color:var(--accent3);}
.status-processing{background:rgba(0,212,255,0.15);color:var(--accent);}
.status-delivered{background:rgba(16,185,129,0.15);color:#10b981;}
.orders-table-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;margin-top:1rem;}
.orders-table-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;}
.orders-table-title{font-family:'Syne',sans-serif;font-weight:700;}
.tick-btn{padding:0.35rem 0.9rem;border-radius:6px;border:none;cursor:pointer;background:rgba(16,185,129,0.15);color:#10b981;font-size:0.78rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:all var(--transition);}
.tick-btn:hover{background:#10b981;color:#fff;}
#reviews{padding:80px 5%;text-align:center;}
.reviews-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;max-width:1100px;margin:0 auto;}
.review-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:2rem;text-align:left;transition:transform var(--transition),border-color var(--transition);}
.review-card:hover{transform:translateY(-4px);border-color:var(--accent2);}
.review-stars{color:var(--accent3);font-size:1rem;margin-bottom:1rem;}
.review-text{color:var(--text2);font-size:0.9rem;line-height:1.7;margin-bottom:1.5rem;font-style:italic;}
.review-author{display:flex;align-items:center;gap:0.75rem;}
.review-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;}
.review-name{font-weight:700;font-size:0.9rem;}.review-location{font-size:0.75rem;color:var(--text2);}
#support{padding:80px 5%;}
.support-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1100px;margin:0 auto;align-items:start;}
.chat-box{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;}
.chat-header{padding:1.2rem 1.5rem;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;gap:0.75rem;}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.chat-name{font-weight:700;color:#fff;font-size:0.95rem;}.chat-status{font-size:0.75rem;color:rgba(255,255,255,0.7);}
.chat-online{width:8px;height:8px;border-radius:50%;background:#4ade80;margin-left:auto;}
.chat-messages{height:300px;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:0.75rem;}
.msg{max-width:85%;padding:0.7rem 1rem;border-radius:14px;font-size:0.875rem;line-height:1.5;}
.msg-ai{background:var(--bg3);border-bottom-left-radius:4px;align-self:flex-start;}
.msg-user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.chat-input-wrap{padding:1rem;border-top:1px solid var(--card-border);display:flex;gap:0.5rem;}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:0.65rem 1rem;color:var(--text);font-size:0.875rem;outline:none;font-family:'DM Sans',sans-serif;}
.chat-send{padding:0.65rem 1rem;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;}
.contact-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:2rem;}
.contact-item{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--card-border);}
.contact-item:last-child{border-bottom:none;}
.contact-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.contact-label{font-size:0.8rem;color:var(--text2);margin-bottom:0.2rem;}.contact-val{font-weight:600;font-size:0.95rem;}
#admin-view{display:none;min-height:100vh;padding:90px 5% 60px;}
.admin-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.3rem 1rem;border-radius:20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--accent3);font-size:0.75rem;font-weight:700;letter-spacing:1px;margin-bottom:1.5rem;}
footer{position:relative;z-index:1;padding:3rem 5% 2rem;border-top:1px solid var(--card-border);text-align:center;}
.footer-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;}
.footer-text{color:var(--text2);font-size:0.85rem;}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;padding:1rem 1.5rem;max-width:320px;box-shadow:0 10px 40px rgba(0,0,0,0.3);display:none;}
.toast.show{display:block;animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity
